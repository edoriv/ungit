name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode 16 if available
        run: |
          if [ -d /Applications/Xcode_16.0.app ]; then
            sudo xcode-select -s /Applications/Xcode_16.0.app/Contents/Developer
          elif [ -d /Applications/Xcode_16.1.app ]; then
            sudo xcode-select -s /Applications/Xcode_16.1.app/Contents/Developer
          elif [ -d /Applications/Xcode_16.2.app ]; then
            sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
          elif [ -d /Applications/Xcode_16.3.app ]; then
            sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer
          elif [ -d /Applications/Xcode.app ]; then
            sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          else
            echo "No compatible Xcode found"
            ls /Applications | grep Xcode || true
            exit 1
          fi

      - name: Show toolchain versions
        run: |
          swift --version
          xcodebuild -version

      - name: Run Swift package tests
        run: swift test

      - name: Build macOS app
        run: xcodebuild -project "UNGIT.xcodeproj" -scheme "UNGIT" -configuration Debug build CODE_SIGNING_ALLOWED=NO
